# Windows 桌面端打包 — 产出 .msi (WiX) 与 .exe (NSIS) 安装包。
# 每次推送主分支自动构建，同时保留手动触发，以便后续每次改版都有对应安装包。
name: build-windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action; Rust 1.88.0 below
        with:
          toolchain: 1.88.0

      - uses: swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Unit tests (statistics engine)
        run: npm test

      - name: Tauri build (msi + nsis)
        # 首次发布先产出可安装的 Windows 包；自动更新签名密钥尚未配置时，
        # 显式关闭 updater 产物，避免把空密钥当成有效签名而导致构建失败。
        run: npx tauri build --bundles msi,nsis --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Upload installers
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: quality-platform-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
