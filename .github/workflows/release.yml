# 正式发布：推送 vX.Y.Z 标签后，自动构建各平台安装包并创建公开 GitHub Release。
# 首次发布不依赖自动更新签名；安装包可直接下载。应用内自动更新将在签名密钥配置后启用。
name: release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag and application versions
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "${GITHUB_REF}^{commit}" refs/remotes/origin/main
          python3 - <<'PY'
          import json, os, pathlib, re, tomllib

          tag = os.environ['TAG']
          if not re.fullmatch(r'v(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)', tag):
              raise SystemExit(f'invalid release tag: {tag!r}; expected vX.Y.Z')
          expected = tag[1:]
          root = pathlib.Path('.')
          package = json.loads((root / 'package.json').read_text(encoding='utf-8'))
          cargo = tomllib.loads((root / 'src-tauri/Cargo.toml').read_text(encoding='utf-8'))
          tauri = json.loads((root / 'src-tauri/tauri.conf.json').read_text(encoding='utf-8'))
          versions = [package.get('version'), cargo.get('package', {}).get('version'), tauri.get('version')]
          if any(version != expected for version in versions):
              raise SystemExit(f'version gate failed; expected {expected}, got {versions}')
          PY

  build-desktop:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            bundles: msi,nsis
            artifact: windows
            files: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - runner: macos-15
            bundles: app,dmg
            artifact: macos-arm64
            files: src-tauri/target/release/bundle/dmg/*.dmg
          - runner: macos-13
            bundles: app,dmg
            artifact: macos-x64
            files: src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm test
      - name: Build installers
        run: npx tauri build --bundles ${{ matrix.bundles }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  build-portable:
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:portable
      - run: mv dist-portable/index.html quality-platform-portable-${{ github.ref_name }}.html
      - uses: actions/upload-artifact@v4
        with:
          name: browser-portable
          path: quality-platform-portable-*.html
          if-no-files-found: error

  publish-release:
    needs: [build-desktop, build-portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Verify assets and publish release
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find release-assets -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.html' \) -print0)
          test "${#assets[@]}" -ge 5 || { echo 'missing release assets' >&2; exit 1; }
          gh release create "$TAG" "${assets[@]}" \
            --verify-tag \
            --title "质量分析平台 $TAG" \
            --notes "安装包见 Assets。Windows：.msi 或 .exe；macOS：按芯片选择 .dmg；浏览器版：HTML 文件。" \
            --latest
